<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Chat - 天使の相談室</title>
    <style>
        :root {
            --angel-blue: #e1f5fe;
            --angel-pink: #ffdae9;
            --accent-blue: #81d4fa;
            --text-color: #78909c;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, var(--angel-blue) 100%);
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* ちりばめられたピンクのハート */
        .heart {
            position: absolute;
            color: #ffb7c5;
            font-size: 14px;
            pointer-events: none;
            animation: heart-float 5s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes heart-float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-25px) rotate(15deg); opacity: 0.3; }
        }

        /* チャットコンテナ */
        .chat-container {
            width: 360px;
            height: 500px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 3px solid white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(179, 229, 252, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
            position: relative;
        }

        .chat-header {
            background: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--angel-blue);
            letter-spacing: 0.1em;
        }

        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 吹き出しスタイル */
        .msg {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .bot-msg {
            align-self: flex-start;
            background: white;
            color: var(--text-color);
            border: 1px solid var(--angel-blue);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent-blue);
            color: white;
        }

        /* 入力エリア */
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            border: 1px solid var(--angel-blue);
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
            color: var(--text-color);
        }

        #send-btn {
            background: var(--angel-pink);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #send-btn:hover {
            filter: brightness(1.05);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- 背景に散りばめたハート -->
    <script>
        // ハートを動的に配置
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = '♥';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.fontSize = (Math.random() * 10 + 10) + 'px';
            document.body.appendChild(heart);
        }
    </script>

    <div class="chat-container">
        <div class="chat-header">໒꒱ 天使のチャット ໒꒱</div>
        
        <div id="chat-log">
            <div class="msg bot-msg">御用の方はキーワードを入力してくださいね。</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="メッセージを入力...">
            <button id="send-btn">送信</button>
        </div>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 返信ロジック
        function getBotResponse(input) {
            if (input.includes("送料")) {
                return "全国一律500円です໒꒱";
            } else if (input.includes("時間")) {
                return "営業時間は 9:00〜18:00 です！";
            } else {
                return "その件については、担当者にお繋ぎしますね。";
            }
        }

        // 画面にメッセージを表示
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}-msg`;
            msgDiv.innerText = text;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; // 自動スクロール
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = "";

            // ボットの返信（少し時間を置く）
            setTimeout(() => {
                const response = getBotResponse(text);
                appendMessage(response, 'bot');
            }, 600);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
