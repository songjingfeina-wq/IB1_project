<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Cafe Menu - 天使界隈</title>
    <style>
        /* 天使界隈をイメージしたカラーパレット */
        :root {
            --main-blue: #b3e5fc;    /* 水色 */
            --sub-white: #ffffff;    /* 白 */
            --accent-blue: #81d4fa;  /* 少し濃い水色 */
            --text-color: #78909c;   /* 柔らかいグレー */
        }

        body {
            background-color: #e1f5fe; /* 薄い水色の背景 */
            background-image: 
                radial-gradient(white 15%, transparent 16%),
                radial-gradient(white 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px; /* 控えめなドット柄 */
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: var(--sub-white);
            text-shadow: 2px 2px 0px var(--accent-blue), -2px -2px 0px var(--accent-blue), 2px -2px 0px var(--accent-blue), -2px 2px 0px var(--accent-blue);
            letter-spacing: 0.15em;
            margin-bottom: 50px;
        }

        /* カード一覧のコンテナ */
        #menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 天使系カードのデザイン */
        .menu-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px); /* すりガラス効果 */
            border-radius: 30px;
            border: 3px solid var(--sub-white);
            box-shadow: 0 10px 20px rgba(179, 229, 252, 0.5);
            padding: 20px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 15px 30px rgba(179, 229, 252, 0.8);
        }

        /* 看板商品（オムライス）の特別装飾 */
        .recommended::after {
            content: "♥ 看板商品 ♥";
            position: absolute;
            top: 10px;
            right: -20px;
            background: var(--accent-blue);
            color: white;
            padding: 5px 30px;
            transform: rotate(30deg);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* アイコンのスタイル */
        .menu-icon {
            font-size: 70px;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(179, 229, 252, 1));
        }

        .menu-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 10px;
        }

        .menu-price {
            font-size: 1.2rem;
            color: #90a4ae;
            background: #f0faff;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
        }

        .menu-price::before {
            content: "໒꒱ "; /* 天使の羽を価格の前に */
        }
    </style>
</head>
<body>

    <h1>Angel Kitchen Menu</h1>

    <div id="menu-container"></div>

    <script>
        // メニューデータ（JSON形式の配列）
        const menuItems = [
            { "name": "天使のオムライス", "price": 1200, "icon": "🍳", "special": true },
            { "name": "雲のクリームパスタ", "price": 1100, "icon": "🍝", "special": false },
            { "name": "水色カフェラテ", "price": 650, "icon": "☕", "special": false },
            { "name": "羽休めメロンソーダ", "price": 600, "icon": "🍹", "special": false },
            { "name": "ぷるぷる純白プリン", "price": 550, "icon": "🍮", "special": false },
            { "name": "ふわもこパンケーキ", "price": 980, "icon": "🥞", "special": false }
        ];

        const container = document.getElementById('menu-container');

        // for文を使ってカードを生成
        for (let i = 0; i < menuItems.length; i++) {
            const item = menuItems[i];

            // div要素を作成
            const card = document.createElement('div');
            // 看板商品には 'recommended' クラスを付与
            card.className = item.special ? 'menu-card recommended' : 'menu-card';

            // カードの中身を組み立て
            card.innerHTML = `
                <span class="menu-icon">${item.icon}</span>
                <div class="menu-name">${item.name}</div>
                <div class="menu-price">${item.price.toLocaleString()}</div>
            `;

            // コンテナに追加
            container.appendChild(card);
        }
    </script>
</body>
</html>
