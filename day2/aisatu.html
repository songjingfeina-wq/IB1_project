<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Welcome - あいさつ</title>
    <style>
        /* 天使界隈カラーの定義 */
        :root {
            --angel-blue: #e1f5fe;
            --angel-pink: #ffdae9; /* 薄いピンク */
            --sub-white: #ffffff;
            --text-color: #78909c;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, var(--angel-blue) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 散りばめられたハート */
        .heart {
            position: absolute;
            color: #ffb7c5;
            font-size: 14px;
            pointer-events: none;
            animation: heart-float 4s ease-in-out infinite;
        }

        @keyframes heart-float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(20deg); opacity: 0.4; }
        }

        /* 四角い箱のスタイル */
        #display-box {
            width: 280px;
            height: 160px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 3px solid var(--sub-white);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 10px 25px rgba(179, 229, 252, 0.3);
            backdrop-filter: blur(5px);
            margin-bottom: 40px;
            transition: all 0.5s ease;
            animation: box-sway 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes box-sway {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ボタンのスタイル */
        .welcome-btn {
            background-color: var(--sub-white);
            color: #81d4fa;
            border: 2px solid var(--sub-white);
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            z-index: 10;
        }

        .welcome-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(179, 229, 252, 0.5);
            background-color: #f0faff;
        }

        /* JSで変化した後のスタイル */
        .pink-active {
            background-color: var(--angel-pink) !important;
            color: white !important;
            border-color: #ffc1d6 !important;
            transform: scale(1.1) translateY(-10px) !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- 背景のハートたち -->
    <div class="heart" style="top: 10%; left: 15%;">♥</div>
    <div class="heart" style="top: 25%; right: 20%; animation-delay: 1s;">♥</div>
    <div class="heart" style="bottom: 20%; left: 10%; animation-delay: 2s;">♥</div>
    <div class="heart" style="bottom: 30%; right: 15%; animation-delay: 0.5s;">♥</div>
    <div class="heart" style="top: 50%; left: 5%; animation-delay: 1.5s;">♥</div>
    <div class="heart" style="top: 70%; right: 8%; animation-delay: 2.5s;">♥</div>

    <!-- メインコンテンツ -->
    <div id="display-box">
        準備はいい？໒꒱
    </div>

    <button class="welcome-btn" onclick="sayWelcome()">魔法をかける</button>

    <script>
        function sayWelcome() {
            // 箱の要素を取得
            const box = document.getElementById('display-box');
            
            // テキストを書き換え
            box.innerText = "いらっしゃいませ！໒꒱";
            
            // クラスを追加してピンク色＆アニメーションを適用
            box.classList.add('pink-active');
        }
    </script>

</body>
</html>
