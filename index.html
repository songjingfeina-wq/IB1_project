<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB1-project Index</title>
  <style>
    /* 全体リセット */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;

      /* 💡 ここでDAY3の中にある最高に可愛い画像を背景に指定します！ */
      background-image: url('day3/hero.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* 画面全体をほんのり明るく、さらに優しく見せるフィルター */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      z-index: 0;
      pointer-events: none;
    }

    /* メインのコンテナ（透き通る白ともこもこフチ） */
    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      width: 100%;
      max-width: 500px;
      padding: 50px 30px;
      border-radius: 40px;
      /* 天使界隈特有の「なみなみ・もこもこ」したフチを2重の白シャドウで再現 */
      box-shadow: 
        0 0 0 10px #ffffff,
        0 15px 35px rgba(147, 197, 253, 0.3);
      text-align: center;
      position: relative;
      z-index: 1;
      border: 3px solid rgba(255, 255, 255, 0.5);
    }

    /* ヘッダーの丸みバッジ */
    .header-badge {
      display: inline-block;
      background: linear-gradient(90deg, #e0f2fe, #f0f9ff);
      color: #38bdf8;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    /* タイトル */
    h1 {
      font-size: 28px;
      color: #0284c7;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0px #ffffff;
    }

    .subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 40px;
    }

    /* 課題のボタン一覧 */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* 雲みたいにぷっくりした白いボタン */
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.95);
      border: 2px dashed #bae6fd; /* 点線にしてファンシーに */
      /* 左右非対称な角丸で、マシュマロみたいなぷっくり感を出す */
      border-radius: 40px 30px 40px 35px / 35px 40px 35px 40px;
      padding: 16px 24px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 8px 15px rgba(186, 230, 253, 0.15);
    }

    /* マウスを乗せたときにぷくっと膨らむアニメーション */
    .item:hover {
      transform: translateY(-4px) scale(1.02);
      background: #ffffff;
      border-style: solid;
      border-color: #7dd3fc;
      box-shadow: 0 12px 22px rgba(56, 189, 248, 0.25);
    }

    /* 左側の「Day」バッジ */
    .day-badge {
      font-size: 11px;
      font-weight: bold;
      color: #38bdf8;
      background: #f0f9ff;
      border: 1px solid #e0f2fe;
      padding: 6px 12px;
      border-radius: 20px;
      min-width: 55px;
      text-align: center;
    }

    /* 真ん中のテキスト */
    .text-area {
      flex-grow: 1;
      text-align: left;
      padding-left: 16px;
    }

    .btn-title {
      font-size: 14px;
      font-weight: bold;
      color: #334155;
      margin-bottom: 2px;
    }

    .btn-desc {
      font-size: 11px;
      color: #94a3b8;
    }

    /* 右側のアイコン */
    .icon-area {
      font-size: 16px;
    }

    /* フッター */
    footer {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 40px;
      font-weight: bold;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-badge">My Repository</div>
    <h1>IB1-project Index 👑</h1>
    <p class="subtitle">日々の制作記録と課題の目次ページ</p>

    <div class="links-list">
      
      <a href="day1/index.html" class="item">
        <span class="day-badge">Day 1</span>
        <div class="text-area">
          <div class="btn-title">最初の課題ページ</div>
          <div class="btn-desc">HTML/CSSのファーストステップ</div>
        </div>
        <span class="icon-area">📖</span>
      </a>

      <a href="day2/index.html" class="item">
        <span class="day-badge">Day 2</span>
        <div class="text-area">
          <div class="btn-title">ステップアップ課題</div>
          <div class="btn-desc">コンポーネントのデザインと配置</div>
        </div>
        <span class="icon-area">🖥️</span>
      </a>

      <a href="day3/index.html" class="item">
        <span class="day-badge">Day 3</span>
        <div class="text-area">
          <div class="btn-title">概念ネイル専門店 LP</div>
          <div class="btn-desc">Tailwind CSSを使用したショップランディングページ</div>
        </div>
        <span class="icon-area">💅</span>
      </a>

    </div>
  </div>

  <footer>
    &copy; 2026 IB1-project. Powered by Cloud & Magic.
  </footer>

</body>
</html>
