<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>概念をまとうネイルチップ専門店【パレット・マジック】</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M+ PLUS Rounded 1c', sans-serif;
        }
        /* 白文字の視認性を爆上げしつつ、ポップでドーリーな雰囲気を出す多重文字影 */
        .text-shadow-kawaii {
            text-shadow: 
                3px 3px 0px #ffb7da, 
                -3px -3px 0px #ffb7da, 
                3px -3px 0px #ffb7da, 
                -3px 3px 0px #ffb7da,
                0px 6px 12px rgba(255, 148, 194, 0.4);
        }
        .text-shadow-sub {
            text-shadow: 
                1.5px 1.5px 0px #7cc7e8,
                -1.5px -1.5px 0px #7cc7e8,
                1.5px -1.5px 0px #7cc7e8,
                -1.5px 1.5px 0px #7cc7e8,
                0px 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="m-0 p-0 overflow-x-hidden bg-[#faf5ff]">

    <section class="relative w-full min-h-screen flex flex-col justify-between bg-cover bg-center bg-no-repeat" style="background-image: url('hero.png');">
        
        <div class="absolute inset-0 bg-gradient-to-b from-white/40 via-transparent to-purple-100/20 pointer-events-none"></div>

        <header class="relative z-10 w-full px-4 py-3 sm:px-8 sm:py-4 flex flex-col sm:flex-row items-center gap-3 sm:justify-between bg-white/80 backdrop-blur-md shadow-sm border-b border-[#ffb7da]/40">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="パレット・マジック ロゴ" class="h-10 w-auto sm:h-14 object-contain">
                <h1 class="text-[#7cc7e8] font-extrabold text-base sm:text-lg md:text-xl tracking-wider">
                    概念をまとうネイルチップ専門店<span class="text-[#ff94c2] block sm:inline sm:ml-2">【パレット・マジック】</span>
                </h1>
            </div>
            
            <nav class="hidden md:flex items-center gap-6 text-sm font-bold text-[#7cc7e8]">
                <a href="#concept" class="hover:text-[#ff94c2] transition-colors">コンセプト</a>
                <a href="#gallery" class="hover:text-[#ff94c2] transition-colors">デザイン例</a>
                <a href="#order" class="bg-[#ff94c2] text-white px-4 py-1.5 rounded-full hover:bg-[#ff7aa7] transition-all">オーダー相談</a>
            </nav>
        </header>

        <div class="relative z-10 flex-grow flex items-center justify-center px-4 py-12">
            <div class="max-w-4xl text-center bg-white/40 backdrop-blur-sm sm:bg-transparent p-6 sm:p-0 rounded-3xl border border-white/60 sm:border-none shadow-xl sm:shadow-none">
                
                <h2 class="text-white text-shadow-kawaii font-black text-2xl sm:text-4xl md:text-5xl leading-snug sm:leading-relaxed md:leading-normal mb-6 sm:mb-8 tracking-wide">
                    「週末のライブも、大好きな日常も。<br class="hidden sm:block">
                    私だけの『概念』をまとって、いざ出陣！」
                </h2>
                
                <p class="text-white text-shadow-sub font-extrabold text-sm sm:text-lg md:text-xl leading-loose max-w-2xl mx-auto px-2">
                    推しカラー、お気に入りの洋服、愛おしいペット……<br class="hidden sm:block">
                    あなたの「大好き」を1からネイルに仕立てます。
                </p>

                <div class="mt-8 sm:mt-10 animate-bounce">
                    <a href="#order" class="inline-block bg-[#ff94c2] hover:bg-[#ff7aa7] text-white font-black text-base sm:text-2xl px-8 py-4 sm:px-14 sm:py-5 rounded-full shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-200 border-b-4 border-[#e06396] tracking-wider">
                        💖 1から相談して作る！オーダーメイドはこちら 💖
                    </a>
                </div>

            </div>
        </div>

        <div class="relative z-10 w-full h-8 sm:h-16 pointer-events-none"></div>

    </section>

</body>
</html>
