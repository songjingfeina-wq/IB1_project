<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワクワク！メッセージボタン</title>
    <style>
        /* 全体の背景とレイアウト */
        body {
            background-color: #f0faff; /* 爽やかな水色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 四角い箱のスタイル */
        #display-box {
            width: 250px;
            height: 150px;
            background-color: #ffffff;
            border: 4px solid #ff99cc; /* ピンクの太めな枠線 */
            border-radius: 20px; /* 角を丸く */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff99cc;
            margin-bottom: 30px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease; /* 変化をなめらかに */
        }

        /* ボタンのスタイル */
        .pop-button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff99cc;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px #d67ba5;
            transition: all 0.1s;
        }

        /* ボタンを押した時の「ポチッ」とした動き */
        .pop-button:active {
            box-shadow: 0 2px #d67ba5;
            transform: translateY(4px);
        }

        .pop-button:hover {
            filter: brightness(1.05);
        }

        /* JavaScriptで追加される黄色スタイル */
        .active-box {
            background-color: #fff176 !important; /* 黄色 */
            color: #f57f17 !important; /* オレンジ系の文字 */
            border-color: #fbc02d !important;
            transform: scale(1.1); /* 少し大きくする */
        }
    </style>
</head>
<body>

    <!-- 箱の部分 -->
    <div id="display-box">
        ここを見てね！
    </div>

    <!-- ボタン部分 -->
    <button class="pop-button" onclick="welcome()">ボタンを押してね</button>

    <script>
        function welcome() {
            // IDを使って箱の要素を取得
            const box = document.getElementById('display-box');
            
            // 箱のテキストを書き換え
            box.innerText = "いらっしゃいませ！";
            
            // CSSクラスを追加して色や動きを変える
            box.classList.add('active-box');
        }
    </script>

</body>
</html>
